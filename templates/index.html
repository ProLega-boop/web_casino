<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0b0e14; --panel: #1a1f26; --accent: #007aff; --text: #fff; --gold: #ffcf40; --win: #4cd964; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; overflow: hidden; height: 100vh; }
        
        #app { display: flex; flex-direction: column; height: 100vh; }
        .view { display: none; flex: 1; padding: 10px; overflow-y: auto; padding-bottom: 90px; }
        .view.active { display: flex; flex-direction: column; }

        /* PvP блоки */
        .top-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .stat-card { background: var(--panel); flex: 1; padding: 10px; border-radius: 12px; text-align: center; border: 1px solid #222; }
        .stat-card small { font-size: 10px; color: #8e8e93; display: block; }
        .stat-card b { color: var(--gold); font-size: 14px; }

        .pool-box { text-align: center; margin: 10px 0; font-size: 22px; font-weight: bold; color: var(--gold); }
        
        #arena { position: relative; width: 100%; height: 180px; background: radial-gradient(circle, #1a1f26 0%, #0b0e14 100%); border-radius: 20px; margin: 10px 0; border: 1px solid #2c323a; overflow: hidden; }
        
        /* Анимация Метеорита */
        .meteor { position: absolute; top: -100px; left: 50%; width: 55px; transform: translateX(-50%) rotate(15deg); display: none; z-index: 10; filter: drop-shadow(0 0 15px #ff4500); }
        .shadow-circle { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); width: 0; height: 0; background: rgba(0,0,0,0.8); border-radius: 50%; filter: blur(4px); opacity: 0; transition: 0.5s; }

        .btn-bet { background: var(--accent); border: none; color: white; padding: 16px; border-radius: 15px; font-weight: bold; width: 100%; font-size: 16px; transition: transform 0.1s; box-shadow: 0 4px 15px rgba(0,122,255,0.3); }
        .btn-bet:active { transform: scale(0.94); background: #0062cc; }

        .bets-wrap { margin-top: 15px; }
        .bet-row { background: var(--panel); padding: 12px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; border-left: 4px solid transparent; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        
        .bet-row.is-me { border-left-color: var(--accent); background: #1e2530; }
        .bet-row .u { display: flex; align-items: center; gap: 10px; }
        .bet-row .av { width: 32px; height: 32px; border-radius: 50%; background: #333; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: bold; }

        /* Профиль */
        .p-info { background: var(--panel); padding: 25px; border-radius: 25px; text-align: center; margin-bottom: 15px; border: 1px solid #2c323a; }
        .p-av { width: 80px; height: 80px; background: var(--accent); border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 35px; border: 3px solid #0b0e14; }

        /* Навигация */
        .navbar { position: fixed; bottom: 0; width: 100%; background: var(--panel); display: flex; padding: 12px 0; border-top: 1px solid #222; }
        .nav-link { flex: 1; text-align: center; color: #8e8e93; font-size: 12px; border: none; background: none; }
        .nav-link.active { color: var(--accent); font-weight: bold; }

        /* Модалка победы */
        #win-popup { position: fixed; top: 45%; left: 50%; transform: translate(-50%, -50%); width: 75%; background: var(--panel); border-radius: 25px; padding: 25px; text-align: center; display: none; z-index: 100; border: 2px solid var(--gold); box-shadow: 0 0 40px rgba(0,0,0,0.9); }
    </style>
</head>
<body>
    <div id="app">
        <div id="pvp" class="view active">
            <div class="top-row">
                <div class="stat-card"><small>TOP GAME</small><b id="top-g">0.00</b></div>
                <div class="stat-card"><small>LAST GAME</small><b id="last-g">0.00</b></div>
            </div>
            <div class="pool-box">POOL: <span id="pool">0.00</span> TON</div>
            <div id="arena">
                <div id="shadow" class="shadow-circle"></div>
                <img id="meteor" class="meteor" src="https://cdn-icons-png.flaticon.com/512/2530/2530851.png">
                <div id="timer" style="position:absolute; width:100%; text-align:center; top:80px; color:#555; font-weight:bold;">ОЖИДАНИЕ...</div>
            </div>
            <button class="btn-bet" onclick="doBet()">ВСТУПИТЬ В БОЙ</button>
            <div class="bets-wrap" id="bets"></div>
        </div>

        <div id="profile" class="view">
            <div class="p-info">
                <div class="p-av" id="pav">?</div>
                <h2 id="pname" style="margin:5px 0;">User</h2>
                <div style="color:var(--gold); font-size:24px; font-weight:bold;"><span id="pbal">0.00</span> TON</div>
            </div>
            <div class="stat-card" style="text-align:left; width:100%; box-sizing:border-box;">
                <b style="color:var(--accent);">💎 РЕФЕРАЛЫ</b><br>
                Приглашено: <span id="ref-c">0</span><br>
                Заработано: <span id="ref-e">0.00</span> TON
                <div id="ref-l" style="font-size:10px; color:#555; margin-top:10px; word-break:break-all;"></div>
            </div>
        </div>

        <nav class="navbar">
            <button class="nav-link active" id="btn-pvp" onclick="go('pvp')">⚔️ PvP</button>
            <button class="nav-link" id="btn-profile" onclick="go('profile')">👤 Профиль</button>
        </nav>
    </div>
    ```
<div id="win-popup">
        <h3 style="margin:0; color:var(--gold); letter-spacing:1px;">РАУНД ОКОНЧЕН</h3>
        <div id="w-name" style="font-size:20px; margin:15px 0; font-weight:bold;"></div>
        <div id="w-prize" style="font-size:26px; font-weight:bold; color:var(--win);"></div>
        <button class="btn-bet" style="padding:10px; margin-top:15px; font-size:14px;" onclick="document.getElementById('win-popup').style.display='none'">КРУТО!</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем на весь экран

        const uid = tg.initDataUnsafe?.user?.id || "local_user";
        const uname = tg.initDataUnsafe?.user?.first_name || "Gamer";
        const refId = new URLSearchParams(window.location.search).get('startapp');
        
        let currentTab = 'pvp';
        let isAnimating = false;

        // Переключение вкладок
        function go(t) {
            currentTab = t;
            document.getElementById('pvp').classList.toggle('active', t === 'pvp');
            document.getElementById('profile').classList.toggle('active', t === 'profile');
            document.getElementById('btn-pvp').classList.toggle('active', t === 'pvp');
            document.getElementById('btn-profile').classList.toggle('active', t === 'profile');
            sync(); // Сразу обновляем данные при переходе
        }

        // Функция отрисовки одной ставки
        function renderBet(b, isMe, container) {
            const div = document.createElement('div');
            div.className = `bet-row ${isMe ? 'is-me' : ''}`;
            div.innerHTML = `
                <div class="u">
                    <div class="av" style="background:${isMe ? 'var(--accent)' : '#333'}">
                        ${b.name[0].toUpperCase()}
                    </div>
                    <span>${isMe ? 'ВЫ' : b.name}</span>
                </div>
                <b>${b.amount.toFixed(2)} TON</b>
            `;
            container.appendChild(div);
        }
        // ГЛАВНАЯ ФУНКЦИЯ СИНХРОНИЗАЦИИ
        async function sync() {
            try {
                const r = await fetch(`/api/get_state?uid=${uid}&username=${uname}&ref_id=${refId || ''}`);
                const d = await r.json();

                // Обновление Профиля
                document.getElementById('pbal').innerText = d.user.bal.toFixed(2);
                document.getElementById('pname').innerText = uname;
                document.getElementById('pav').innerText = uname[0].toUpperCase();
                document.getElementById('ref-c').innerText = d.user.ref_count;
                document.getElementById('ref-e').innerText = d.user.ref_earned.toFixed(2);
                document.getElementById('ref-l').innerText = "Ссылка: " + location.origin + "/?startapp=" + uid;

                // Обновление PvP
                document.getElementById('top-g').innerText = d.top_game.toFixed(2);
                document.getElementById('last-g').innerText = d.last_game.toFixed(2);
                
                if (currentTab === 'pvp') {
                    document.getElementById('pool').innerText = d.game.total_pool.toFixed(2);
                    document.getElementById('timer').innerText = d.game.is_active ? `УДАР ЧЕРЕЗ: ${d.game.timer}с` : "ЖДЕМ ИГРОКОВ...";
                    
                    const bWrap = document.getElementById('bets');
                    bWrap.innerHTML = '';

                    // СОРТИРОВКА: Твоя ставка всегда первая, остальные по убыванию суммы
                    let allBets = d.game.bets.sort((a, b) => b.amount - a.amount);
                    let myIdx = allBets.findIndex(b => b.uid == uid);
                    
                    if (myIdx > -1) {
                        let myBet = allBets.splice(myIdx, 1)[0];
                        renderBet(myBet, true, bWrap);
                    }
                    allBets.forEach(b => renderBet(b, false, bWrap));

                    // Логика анимации метеорита
                    if (d.game.timer === 1 && !isAnimating) {
                        animateMeteor();
                    }

                    // Показ победителя
                    if (d.game.result && document.getElementById('win-popup').style.display !== 'block') {
                        showWin(d.game.result);
                    }
                }
            } catch (e) { console.error("Sync error:", e); }
        }

        // АНИМАЦИЯ МЕТЕОРИТА
        function animateMeteor() {
            isAnimating = true;
            const m = document.getElementById('meteor');
            const s = document.getElementById('shadow');
            
            // 1. Появляется слабая тень
            s.style.opacity = "0.3"; s.style.width = "30px"; s.style.height = "8px";
            
            setTimeout(() => {
                // 2. Тень растет, метеорит летит вниз
                s.style.opacity = "1"; s.style.width = "90px"; s.style.height = "25px";
                m.style.display = 'block';
                m.style.transition = 'top 0.8s cubic-bezier(0.6, 0.04, 0.98, 0.33)';
                m.style.top = '120px';
            }, 300);

            setTimeout(() => {
                // 3. ВЗРЫВ (Вспышка)
                document.getElementById('arena').style.background = "#ffffff";
                tg.HapticFeedback.notificationOccurred('error'); // Вибрация
                
                setTimeout(() => {
                    document.getElementById('arena').style.background = ""; // Возвращаем фон
                    m.style.display = 'none';
                    m.style.top = '-100px';
                    isAnimating = false;
                }, 150);
            }, 1100);
        }

        // ОКНО ПОБЕДИТЕЛЯ
        function showWin(res) {
            // Небольшая задержка после взрыва, чтобы игрок успел увидеть финал анимации
            setTimeout(() => {
                document.getElementById('w-name').innerText = "@" + res.username;
                document.getElementById('w-prize').innerText = "+" + res.prize + " TON";
                document.getElementById('win-popup').style.display = 'block';
                tg.HapticFeedback.notificationOccurred('success');
                
                // Сброс тени
                document.getElementById('shadow').style.width = '0';
                document.getElementById('shadow').style.opacity = '0';
            }, 1200);
        }

        // СТАВКА
        function doBet() {
            fetch('/api/place_bet', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ uid, amount: 1.0 })
            });
            tg.HapticFeedback.impactOccurred('heavy'); // Отдача при клике
        }

        // Запуск
        setInterval(sync, 1000);
        sync();
    </script>
</body>
</html>
